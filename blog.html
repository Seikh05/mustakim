<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="Technical logbook, lab notes, and reflections on Electronics and Telecommunication Engineering by Seikh Souvagya Mustakim.">
  <meta name="theme-color" content="#0b0f19">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230b0f19'/%3E%3Ctext x='16' y='21' font-family='Outfit,sans-serif' font-size='14' font-weight='bold' text-anchor='middle' fill='%2338bdf8'%3ESM%3C/text%3E%3C/svg%3E">
  
  <!-- Preconnect Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  
  <link rel="stylesheet" href="assets/style.css">
  
  <!-- Load the centralized data first -->
  <script src="portfolio-data.js"></script>
  <!-- Load script engine -->
  <script src="assets/site.js"></script>
  
  <script>
    // Apply theme immediately to prevent flash of light mode
    const savedTheme = localStorage.getItem("theme") || "dark";
    document.documentElement.setAttribute("data-theme", savedTheme);
  </script>
</head>
<body>
  <a class="skip" href="#main">Skip to content</a>
  <div class="wrap">
  
    <!-- HEADER -->
    <header class="topbar">
      <a class="brand" href="index.html">Loading...</a>
      <nav class="nav" aria-label="Primary">
        <a href="index.html">Home</a>
        <a href="blog.html" class="active" aria-current="page">Notes</a>
        <a href="assets/MyCV.pdf" target="_blank">CV</a>
        <button class="theme-btn" aria-label="Toggle Theme" title="Toggle Theme">
          <!-- Moon Icon -->
          <svg class="moon-icon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
          <!-- Sun Icon -->
          <svg class="sun-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        </button>
      </nav>
    </header>
  
    <main id="main">
      <div class="page-head">
        <h1>Notes</h1>
        <p>Technical logs, lab notes, and concepts worth writing down.</p>
      </div>
  
      <section aria-label="Blog posts list">
        <div id="list">
          <!-- Dynamically populated from portfolio-data.js -->
        </div>
      </section>
    </main>
  
    <!-- FOOTER -->
    <footer>
      <span id="footer-year-name"></span>
      <span>Odisha, India</span>
    </footer>
  </div>
  
  <script>
    window.addEventListener("DOMContentLoaded", () => {
      initTheme();
      renderBlogList("list");
      
      // Update footer details
      const data = window.portfolioData;
      if (data) {
        const footerYearNameEl = document.getElementById("footer-year-name");
        if (footerYearNameEl) {
          footerYearNameEl.innerHTML = `&copy; ${new Date().getFullYear()} ${data.profile.name}`;
        }
      }
    });
  </script>
</body>
</html>
